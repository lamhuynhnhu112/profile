<html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Travel Memories - Nhu</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #e1f5fe;
            --lavender: #f3e5f5;
            --accent: #9575cd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f8fbff;
            text-align: center;
            padding-bottom: 50px;
        }

        header {
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--mint), var(--lavender));
            margin-bottom: 40px;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 10%;
        }

        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .photo-card:hover {
            transform: scale(1.03);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <p>Những khoảnh khắc mình đã ghi lại qua ống kính</p>
</header>

<div class="gallery">
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 1"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 2"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 3"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 4"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 5"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 6"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 7"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 8"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 9"></div>
    <div class="photo-card"><img src="https://via.placeholder.com/300" alt="Ảnh 10"></div>
</div>

<a href="/index.html" class="back-btn">⬅ Quay về Trang Chủ</a>

</body>

</html>
